<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>UTCify</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=PT+Mono">
  <link rel="stylesheet" href="/styles/screen.css">
</head>
<body>
  <main>
    <h1>UTCify</h1>
    <p>Convert all date formats to UTC</p>

    <br>

    <input
      id="datetime-string"
      type="text"
      name="datetime-string"
      value="5 March 2019, 03:26 PM EDT"
    >

    <br>

    <div id="utc-output-wrapper">
      <p id="utc-output">2019-03-05T19:26:00.000Z</p>
      <button id="copy-button" type="button" aria-label="Copy to clipboard" title="Copy to clipboard">
        <svg class="icon icon-copy" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <rect x="8" y="3" width="11" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/>
          <path d="M5 7v12a2 2 0 0 0 2 2h9" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <svg class="icon icon-check" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path d="M4 12.5l5 5L20 6.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <section id="info"></section>

    <hr>

    <small>
      By <a href="https://adriansieber.com">Adrian Sieber</a>
      &middot;
      <a href="https://github.com/ad-si/utcify">GitHub</a>
    </small>

    <script type="module" src="/scripts/main.js"></script>
  </main>
</body>
</html>
