<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>UTCify</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=PT+Mono">
  <link rel="stylesheet" href="/styles/screen.css">
</head>
<body>
  <main>
    <h1>UTCify</h1>
    <p>Convert all date formats to UTC</p>

    <br>

    <input
      id="datetime-string"
      type="text"
      name="datetime-string"
      value="5 March 2019, 03:26 PM EDT"
    >

    <br>

    <p id="utc-output">2019-03-05T19:26:00.000Z</p>

    <section id="info"></section>

    <hr>

    <small>By <a href="https://adriansieber.com">Adrian Sieber</a></small>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chrono-node/1.3.11/chrono.min.js"></script>
    <script src="/scripts/main.js"></script>
  </main>
</body>
</html>
